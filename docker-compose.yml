services:
  db:
    image: postgres:16-alpine
    container_name: market-watch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_watch}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-market_watch}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: python:3.12-slim
    container_name: market-watch-api
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -e '.[dev]' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@db:5432/market_watch}
    volumes:
      - .:/app
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: